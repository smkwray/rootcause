    family: "state_eitc"
    treatment: "state_eitc_rate"
    outcome: "violent_crime_rate"
    tier: "secondary"
    event_col: "eitc_event_year"
    event_threshold: 0.01
    methods:
      - "baseline"
      - "dml"
      - "overlap"
      - "support_trim"
      - "robustness"
      - "border"
      - "falsification"

  - slug: "eitc_property"
