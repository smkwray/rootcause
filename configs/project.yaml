# configs/project.yaml — Authoritative analysis configuration

study_name: "Causal Poverty-Crime Analysis"
start_year: 2000
end_year: 2024

panel:
  unit: "county_fips x year"
  cluster_var: "state_fips"

analysis_lanes:
  - slug: "min_wage_violent"
    title: "Minimum Wage -> Violent Crime"
    family: "minimum_wage"
    treatment: "effective_min_wage"
    outcome: "violent_crime_rate"
    tier: "primary"
    event_col: "min_wage_event_year"
    event_threshold: 0.01
    methods:
      - "baseline"
      - "dml"
      - "overlap"
      - "support_trim"
      - "robustness"
      - "staggered"
      - "border"
      - "falsification"

  - slug: "min_wage_property"
    title: "Minimum Wage -> Property Crime"
    family: "minimum_wage"
    treatment: "effective_min_wage"
    outcome: "property_crime_rate"
    tier: "primary"
    event_col: "min_wage_event_year"
    event_threshold: 0.01
    methods:
      - "baseline"
      - "dml"
      - "overlap"
      - "support_trim"
      - "robustness"
      - "staggered"
      - "border"
      - "falsification"

  - slug: "snap_bbce_violent"
    title: "SNAP BBCE -> Violent Crime"
    family: "snap_bbce"
    treatment: "broad_based_cat_elig"
    outcome: "violent_crime_rate"
    tier: "exploratory"
    event_col: "snap_bbce_event_year"
    event_threshold: 0.5
    methods:
      - "baseline"
      - "staggered"

  - slug: "snap_bbce_property"
    title: "SNAP BBCE -> Property Crime"
